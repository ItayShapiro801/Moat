# Render Blueprint for the Moat backend (FastAPI).
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# Secrets are marked `sync: false` and must be set in the dashboard, never committed.
services:
  - type: web
    name: moat-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FMP_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      # Set to the deployed frontend origin, e.g. https://moat-yourname.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false
